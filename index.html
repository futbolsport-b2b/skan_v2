<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v7.0a</title>
    <link rel="stylesheet" href="style.css?v=7.0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#000000">
</head>
<body class="ean-mode">
    <div id="error-overlay" style="display:none;"><div id="error-text">BŁĄD</div></div>
    
    <div id="image-zoom-overlay" style="display:none; opacity:0; transition: opacity 0.3s;">
        <img id="zoomed-img" src="" alt="Powiększenie">
    </div>
    
    <div class="app-container">
        <header id="main-header">
            <div class="header-title-bar" id="header-title-bar">
                <img src="logo.png" alt="Logo" id="header-logo">
                <div class="header-status-group">
                    <div id="wifi-indicator" class="status-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12,21L15.6,16.2C14.6,15.45 13.35,15 12,15C10.65,15 9.4,15.45 8.4,16.2L12,21M22.7,11.5C20,9.1 16.2,7.7 12,7.7C7.8,7.7 4,9.1 1.3,11.5L3.1,13.9C5.4,12 8.5,10.7 12,10.7C15.5,10.7 18.6,12 20.9,13.9L22.7,11.5M12,3C7.1,3 2.7,4.8 0,7.7L1.8,10.1C4.3,8 7.9,6.5 12,6.5C16.1,6.5 19.7,8 22.2,10.1L24,7.7C21.3,4.8 16.9,3 12,3Z" />
                        </svg>
                    </div>
                    <div id="battery-indicator" class="status-icon">
                        <span id="battery-level">--%</span>
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M16,20H8V6H16M16.67,4H15V2H9V4H7.33A0.67,0.67 0 0,0 6.67,4.67V21.33A0.67,0.67 0 0,0 7.33,22H16.67A0.67,0.67 0 0,0 17.33,21.33V4.67A0.67,0.67 0 0,0 16.67,4Z" />
                        </svg>
                    </div>
                    <span class="version-text">v7.0a</span>
                </div>
            </div>
            
            <div class="header-main-row" id="header-main-row" style="display:none;">
                <button id="btn-logout" class="header-btn">WYLOGUJ</button>
                <div id="user-info">Użytkownik: -</div>
                <button id="btn-finish-order" class="header-btn" style="display:none;">ZAKOŃCZ</button>
            </div>
            <div id="global-progress-bar" class="progress-container" style="display:none;">
                <div id="global-progress-fill" class="progress-fill"></div>
                <div id="global-progress-text" class="progress-text">0/0</div>
            </div>
        </header>

        <main id="content-area">
            <section id="view-login" class="view-section">
                <div class="login-box">
                    <h2>LOGOWANIE</h2>
                    <div id="login-list" class="user-grid"></div>
                </div>
            </section>

            <section id="view-dashboard" class="view-section" style="display:none;">
                <div class="tab-container">
                    <button class="tab-btn active" id="tab-todo">DO ZROBIENIA</button>
                    <button class="tab-btn" id="tab-done">ZAKOŃCZONE</button>
                </div>
                <div class="order-search-container">
                    <button id="btn-open-search-modal" class="btn-search-trigger">SZUKAJ ZAMÓWIENIA / EAN</button>
                </div>
                <div id="order-list" class="list-scroll"></div>
            </section>

            <section id="view-product" class="view-section" style="display:none;">
                <div id="product-card" class="product-card">
                    <div class="product-header">
                        <div id="product-name" class="p-title">-</div>
                        <div id="product-ean" class="p-subtitle">-</div>
                    </div>
                    <div class="product-main">
                        <div class="img-container">
                            <img id="product-img" src="" alt="Produkt" onclick="zoomImage(this.src)">
                        </div>
                        <div class="product-info-side">
                            <div class="info-block">
                                <span class="label">LOKALIZACJA</span>
                                <span id="product-loc" class="value">-</span>
                            </div>
                            <div class="info-block">
                                <span class="label">DO SPRAWDZENIA</span>
                                <span id="product-qty-needed" class="value-big">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="scanner-info-panel">
                        <div class="scanner-anim-icon">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path fill="#32D74B" d="M3,5V9H5V5H9V3H5A2,2 0 0,0 3,5M5,15H3V19A2,2 0 0,0 5,21H9V19H5V15M19,19H15V21H19A2,2 0 0,0 21,19V15H19V19M19,3H15V5H19V9H21V5A2,2 0 0,0 19,3M7,7H17V9H7V7M7,11H17V13H7V11M7,15H17V17H7V15Z" />
                            </svg>
                        </div>
                        <span class="breathing-text">UŻYJ PRZYCISKU SKANERA</span>
                    </div>

                    <div class="product-actions">
                        <button id="btn-product-back" class="btn-cancel">POWRÓT</button>
                        <button id="btn-manual-qty" class="btn-success">WPISZ RĘCZNIE</button>
                    </div>
                </div>
            </section>
        </main>

        <input type="text" id="hidden-scanner-input" style="position:absolute; opacity:0; pointer-events:none;">
    </div>

    <div id="modal-search" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">WYSZUKAJ</div>
            <div id="search-input-display" class="custom-input-display search-display">Wpisz kod...</div>
            <div class="custom-numpad">
                <button class="np-btn-search" data-val="1">1</button><button class="np-btn-search" data-val="2">2</button><button class="np-btn-search" data-val="3">3</button>
                <button class="np-btn-search" data-val="4">4</button><button class="np-btn-search" data-val="5">5</button><button class="np-btn-search" data-val="6">6</button>
                <button class="np-btn-search" data-val="7">7</button><button class="np-btn-search" data-val="8">8</button><button class="np-btn-search" data-val="9">9</button>
                <button class="np-btn-search np-special-search" data-val="/">/</button><button class="np-btn-search" data-val="0">0</button><button class="np-btn-search np-action-search" id="np-search-del">⌫</button>
            </div>
            <div class="modal-action-row" style="margin-top: 15px;">
                <button id="btn-search-cancel" class="btn-cancel">ZAMKNIJ</button>
                <button id="btn-search-ok" class="btn-success">SZUKAJ</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=7.0a"></script>
</body>
</html>
