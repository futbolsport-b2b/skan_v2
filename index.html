<!DOCTYPE html><html lang="pl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v3.0</title>
    <link rel="stylesheet" href="style.css?v=3.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1c1c1e">
    <script src="https://unpkg.com/html5-qrcode"></script></head>
<body>
    <div id="error-overlay"><div id="error-text">BŁĄD</div></div>
    <div id="image-zoom-overlay"><img id="zoomed-img" src="" alt="Powiększenie"></div>
    
    <div class="app-container">
        <header id="main-header">
            <div id="brand-title" class="brand-title">SYSTEM B2B v3.0 | DASHBOARD</div>
            <div class="header-main-row" id="header-main-row" style="display: none;">
                <div id="order-val"></div>
                <button id="btn-finish-icon">ZAKOŃCZ</button>
            </div>
            <div id="global-progress-bar" style="display:none;"><div id="global-progress-fill"></div></div>
        </header>

        <main id="main-view">
            <section id="view-user-selection">
                <h2 class="view-label">WYBIERZ OPERATORA</h2>
                <div id="user-list" class="user-grid"></div>
            </section>

            <section id="view-orders-dashboard" style="display:none;">
                <div class="dashboard-ctrl">
                    <button id="btn-logout" class="btn-small">⬅ WYLOGUJ</button>
                    <span id="display-user-name">---</span>
                </div>
                <h2 class="view-label">TWOJE ZAMÓWIENIA</h2>
                <div id="orders-list-container"></div>
            </section>

            <section id="scanner-box" style="display:none;">
                <button id="btn-back-scan"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></button>
                <button id="btn-torch">🔦</button>
                <div id="scanner-instruction">
                    <span class="instruction-label">SKANUJ: <b id="target-kat-val">---</b> | ROZ: <b id="target-size-val">---</b></span>
                </div>
                <div id="reader"></div>
                <div id="scanner-visual">
                    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
                    <div id="laser-line"></div>
                </div>
            </section>

            <section id="task-panel" style="display:none;">
                <div class="task-card">
                    <div class="task-nav">
                        <button id="btn-prev" class="btn-circle">◀</button>
                        <span class="task-lp-info">POZ. <b id="task-lp">--</b></span>
                        <button id="btn-next" class="btn-circle">▶</button>
                    </div>
                    <div class="task-content" id="product-data-area">
                        <div id="freeze-overlay"></div>
                        <h1 id="task-name">---</h1>
                        <div class="product-image-box" id="product-image-box"><img id="task-img" src=""></div>
                        <div class="product-meta-row">
                            <span id="task-kat">---</span><span class="meta-separator">|</span><span>ROZ: <b id="task-size">---</b></span>
                        </div>
                        <div class="task-qty-box"><span class="qty-label">DO POBRANIA</span><div id="task-qty">0</div></div>
                        <div id="task-notes-row" style="display:none;">UWAGI: <b id="task-notes">---</b></div>
                    </div>
                    <button id="btn-scan-item" class="btn-primary">SKANUJ PRODUKT</button>
                    <div id="loading-bar-wrapper"><div id="loading-bar-inner"></div></div>
                </div>
            </section>
        </main>

        <div id="qty-modal">
            <div class="sheet">
                <div class="sheet-header"><h2 id="qty-name">---</h2><span id="qty-kat-val">---</span></div>
                <div class="remain-badge">Pozostało: <b id="qty-remain">0</b></div>
                <div class="quick-add-row">
                    <button class="btn-quick" data-add="1">+1</button>
                    <button class="btn-quick" data-add="5">+5</button>
                    <button class="btn-quick" id="btn-quick-max">MAX</button>
                </div>
                <div id="qty-input-display
