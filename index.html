<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v7.5</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css?v=7.5">
    <link rel="manifest" href="manifest.json?v=7.4">
    <meta name="theme-color" content="#000000">
</head>
<body class="ean-mode">
    <div id="error-overlay" style="display:none;"><div id="error-text">BŁĄD</div></div>
    
    <div id="image-zoom-overlay" style="display:none; opacity:0; transition: opacity 0.3s;">
        <img id="zoomed-img" src="" alt="Powiększenie">
    </div>
    
    <div id="order-complete-overlay" style="display: none;">
        <div class="success-modal">
            <div class="success-icon-wrapper">
                <svg class="success-svg" viewBox="0 0 52 52">
                    <circle class="success-circle" cx="26" cy="26" r="25" fill="none" />
                    <path class="success-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
                </svg>
            </div>
            <h2 class="success-text">ZAMÓWIENIE ZREALIZOWANE</h2>
        </div>
    </div>
    
    <div class="app-container">
        
        <header id="main-header" style="display: none;">
            <div class="header-title-bar" id="header-title-bar">
                <img src="logo.png" alt="Logo" id="header-logo">
                <div class="header-status-group">
                    <span class="version-text">v7.5</span>
                    <div class="ios-status-icons">
                        <svg id="icon-wifi" class="status-icon-svg" viewBox="0 0 24 24">
                            <path d="M12 21l-12-11.65c1.1-1.25 4.89-4.85 12-4.85s10.9 3.6 12 4.85l-12 11.65z"/>
                        </svg>
                        <div class="battery-group">
                            <span id="battery-text">--%</span>
                            <div class="battery-icon">
                                <div id="battery-level-bar"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="header-main-row" id="header-main-row" style="display: none;">
                <div id="order-val"></div>
                <button id="btn-finish-icon">ZAKOŃCZ</button>
            </div>
            <div id="global-progress-bar" style="display:none;">
                <div id="global-progress-fill"></div>
            </div>
        </header>

        <main id="main-view">
            <section id="view-pin-login" class="view-section" style="display: flex;">
                <div class="pin-container">
                    <h2 class="pin-title" id="pin-title">PODAJ PIN</h2>
                    <div class="pin-dots" id="pin-dots">
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                        <div class="pin-dot"></div>
                    </div>
                    <div id="pin-loader" style="display: none;" class="loader-container">
                        <div class="modern-spinner"></div>
                        <div class="loader-text-small">ŁĄCZENIE Z BAZĄ...</div>
                    </div>
                    <div class="custom-numpad" id="pin-numpad">
                        <button class="np-btn-pin" data-val="1">1</button><button class="np-btn-pin" data-val="2">2</button><button class="np-btn-pin" data-val="3">3</button>
                        <button class="np-btn-pin" data-val="4">4</button><button class="np-btn-pin" data-val="5">5</button><button class="np-btn-pin" data-val="6">6</button>
                        <button class="np-btn-pin" data-val="7">7</button><button class="np-btn-pin" data-val="8">8</button><button class="np-btn-pin" data-val="9">9</button>
                        <button class="np-btn-pin np-action-pin" id="np-pin-clear">C</button><button class="np-btn-pin" data-val="0">0</button><button class="np-btn-pin np-action-pin" id="np-pin-del">⌫</button>
                    </div>
                </div>
            </section>

            <section id="view-user-selection" class="view-section" style="display: none;">
                <div id="user-list" class="user-grid"></div>
            </section>

            <section id="view-orders-dashboard" class="view-section" style="display:none;">
                <div class="dashboard-ctrl">
                    <button id="btn-logout" class="btn-icon-modern">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 5 12 10 7"></polyline><line x1="19" y1="12" x2="5" y2="12"></line></svg>
                    </button>
                    
                    <div class="user-info-group">
                        <span id="display-user-name">---</span>
                        
                        <button id="btn-refresh-orders" class="btn-icon-modern" title="Pobierz nowe zamówienia">
                            <svg id="refresh-svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                            </svg>
                            <span id="refresh-counter" style="display:none;"></span>
                        </button>

                        <button id="btn-manual-lock" class="btn-icon-modern lock-btn">
                            <svg id="icon-lock-closed" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <svg id="icon-lock-open" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="dashboard-tools">
                    <div class="tabs-container">
                        <button class="tab-btn active" id="tab-todo" onclick="switchTab('todo')">DO ZROBIENIA</button>
                        <div class="tab-divider"></div>
                        <button class="tab-search-btn" id="btn-toggle-search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </button>
                        <div class="tab-divider"></div>
                        <button class="tab-btn" id="tab-done" onclick="switchTab('done')">UKOŃCZONE</button>
                    </div>
                </div>

                <div id="orders-list-container"></div>
            </section>

            <section id="task-panel" class="view-section" style="display:none;">
                <div class="task-card" id="main-task-card">
                    <div class="task-nav" id="task-nav-area">
                        <button id="btn-prev" class="btn-nav-squircle">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <span id="task-lp" class="task-lp-badge">--</span>
                        <button id="btn-next" class="btn-nav-squircle">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </div>
                    
                    <div class="task-content" id="product-data-area">
                        <div id="freeze-overlay"></div>
                        <h1 id="task-name">Ładowanie...</h1>
                        
                        <div class="product-image-box" id="product-image-box" style="display:none;">
                            <img id="task-img" src="" alt="Zdjęcie produktu">
                        </div>

                        <div class="product-meta-row">
                            <span id="task-kat">---</span><span class="meta-separator">|</span><span class="size-label">ROZ: <b id="task-size">---</b></span>
                        </div>
                        <div class="task-qty-box"><span class="qty-label">DO POBRANIA</span><div id="task-qty">0</div></div>
                        <div id="task-notes-row" style="display:none;">UWAGI: <b id="task-notes">---</b></div>
                    </div>
                    
                    <div id="task-action-container" class="task-action-row">
                        <div id="hw-scan-indicator" class="neon-scanner-container">
                            <svg class="neon-scanner-svg" viewBox="0 0 100 60">
                                <rect class="scanner-frame" x="5" y="5" width="90" height="50" rx="10" />
                                <line class="neon-beam" x1="10" y1="30" x2="90" y2="30" />
                            </svg>
                            <span class="scanner-label" id="scanner-label-text">UŻYJ PRZYCISKU SKANOWANIA</span>
                        </div>
                        
                        <button id="btn-mark-brak" class="btn-brak-trigger">B</button>
                        
                        <button id="btn-manual-add" class="btn-manual-trigger" disabled>
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line><line x1="9" y1="15" x2="9.01" y2="15"></line><line x1="15" y1="15" x2="15.01" y2="15"></line></svg>
                        </button>
                        <div id="loading-bar-wrapper"><div id="loading-bar-inner"></div></div>
                    </div>
                </div>
            </section>
        </main>

        <div id="brak-modal" style="display:none;">
            <div class="sheet" style="padding-top: 35px;">
                <div class="sheet-header">
                    <h2 id="brak-modal-text" style="font-size:22px; color: var(--error); margin-bottom: 25px;">CZY OZNACZYĆ PRODUKT JAKO BRAK?</h2>
                </div>
                <div class="modal-action-row">
                    <button id="btn-brak-cancel" class="btn-cancel">NIE</button>
                    <button id="btn-brak-confirm" class="btn-success" style="background: var(--error); color: #fff;">TAK</button>
                </div>
            </div>
        </div>

        <div id="qty-modal" style="display:none;">
            <div class="sheet">
                <div class="sheet-header">
                    <h2 id="qty-name">---</h2>
                    <span id="qty-kat-val">Nr Kat: ---</span>
                </div>
                <div class="remain-badge">Pozostało do zebrania: <b id="qty-remain">0</b></div>
                <div class="quick-add-row">
                    <button class="btn-quick" data-add="1">+1</button>
                    <button class="btn-quick" data-add="5">+5</button>
                    <button class="btn-quick" id="btn-quick-max">MAX</button>
                </div>
                <div id="qty-input-display" class="custom-input-display">0</div>
                <div class="custom-numpad">
                    <button class="np-btn" data-val="1">1</button><button class="np-btn" data-val="2">2</button><button class="np-btn" data-val="3">3</button>
                    <button class="np-btn" data-val="4">4</button><button class="np-btn" data-val="5">5</button><button class="np-btn" data-val="6">6</button>
                    <button class="np-btn" data-val="7">7</button><button class="np-btn" data-val="8">8</button><button class="np-btn" data-val="9">9</button>
                    <button class="np-btn np-action" id="np-clear">C</button><button class="np-btn" data-val="0">0</button><button class="np-btn np-action" id="np-del">⌫</button>
                </div>
                <div class="modal-action-row">
                    <button id="btn-qty-cancel" class="btn-cancel">ANULUJ</button>
                    <button id="btn-qty-ok" class="btn-success">ZATWIERDŹ</button>
                </div>
            </div>
        </div>

        <div id="search-modal" style="display:none;">
            <div class="sheet sheet-search">
                <div class="sheet-header">
                    <h2 style="font-size:16px; margin: 0 0 10px; color: var(--text-secondary);">WYSZUKAJ ZAMÓWIENIE</h2>
                </div>
                <div id="search-input-display" class="custom-input-display search-display">Wpisz kod...</div>
                
                <div class="custom-numpad">
                    <button class="np-btn-search" data-val="1">1</button><button class="np-btn-search" data-val="2">2</button><button class="np-btn-search" data-val="3">3</button>
                    <button class="np-btn-search" data-val="4">4</button><button class="np-btn-search" data-val="5">5</button><button class="np-btn-search" data-val="6">6</button>
                    <button class="np-btn-search" data-val="7">7</button><button class="np-btn-search" data-val="8">8</button><button class="np-btn-search" data-val="9">9</button>
                    <button class="np-btn-search np-special-search" data-val="/">/</button><button class="np-btn-search" data-val="0">0</button><button class="np-btn-search np-action-search" id="np-search-del">⌫</button>
                </div>
                
                <div class="modal-action-row" style="margin-top: 15px;">
                    <button id="btn-search-cancel" class="btn-cancel">ZAMKNIJ</button>
                    <button id="btn-search-ok" class="btn-success">SZUKAJ</button>
                </div>
            </div>
        </div>

        <input type="text" id="hidden-scanner-input" class="hidden-scanner" inputmode="none" autocomplete="off" />

    </div>
    <script src="app.js?v=7.5"></script>
</body>
</html>
