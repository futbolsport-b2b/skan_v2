<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>B2B TERMINAL v3.1</title>
    <link rel="stylesheet" href="style.css?v=3.1">
    <meta name="theme-color" content="#1c1c1e">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div id="error-overlay" style="display:none;"><div id="error-text">BŁĄD</div></div>
    <div id="image-zoom-overlay" style="display:none;"><img id="zoomed-img" src="" alt=""></div>
    
    <div class="app-container">
        <header id="main-header">
            <div id="brand-title" class="brand-title">SYSTEM B2B | ZKI_V2</div>
            <div class="header-main-row" id="header-main-row" style="display: none;">
                <div id="order-val"></div>
                <button id="btn-finish-icon">ZAKOŃCZ</button>
            </div>
            <div id="global-progress-bar" style="display:none;">
                <div id="global-progress-fill"></div>
            </div>
        </header>

        <main id="main-view">
            <section id="view-user-selection">
                <h2 class="view-label">WYBIERZ OPERATORA</h2>
                <div id="user-list" class="user-grid"></div>
            </section>

            <section id="view-orders-dashboard" style="display:none;">
                <div class="dashboard-ctrl">
                    <button id="btn-logout" class="btn-small">⬅ WYLOGUJ</button>
                    <span id="display-user-name">---</span>
                </div>
                <h2 class="view-label">TWOJE ZAMÓWIENIA</h2>
                <div id="orders-list-container"></div>
            </section>

            <section id="scanner-box" style="display:none;">
                <button id="btn-back-scan">⬅</button>
                <button id="btn-torch">🔦</button>
                <div id="scanner-instruction">
                    <span class="instruction-label">SKANUJ:</span>
                    <div id="target-display"><b id="target-kat-val">---</b> | ROZ: <b id="target-size-val">---</b></div>
                </div>
                <div id="reader"></div>
                <div id="scanner-visual">
                    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
                    <div id="laser-line"></div>
                </div>
            </section>

            <section id="task-panel" style="display:none;">
                <div class="task-card">
                    <div class="task-nav">
                        <button id="btn-prev" class="btn-circle">◀</button>
                        <span class="task-lp-info">POZ. <b id="task-lp">--</b></span>
                        <button id="btn-next" class="btn-circle">▶</button>
                    </div>
                    <div class="task-content">
                        <h1 id="task-name">Ładowanie...</h1>
                        <div class="product-image-box"><img id="task-img" src="" alt=""></div>
                        <div class="product-meta-row">
                            <span id="task-kat">---</span> | ROZ: <b id="task-size">---</b>
                        </div>
                        <div class="task-qty-box">
                            <span class="qty-label">DO POBRANIA</span>
                            <div id="task-qty">0</div>
                        </div>
                    </div>
                    <button id="btn-scan-item" class="btn-primary">SKANUJ PRODUKT</button>
                </div>
            </section>
        </main>

        <div id="qty-modal" style="display:none;">
            <div class="sheet">
                <h2 id="qty-name">---</h2>
                <div class="remain-badge">Pozostało: <b id="qty-remain">0</b></div>
                <div id="qty-input-display" class="custom-input-display">0</div>
                <div class="custom-numpad">
                    <button class="np-btn" data-val="1">1</button><button class="np-btn" data-val="2">2</button><button class="np-btn" data-val="3">3</button>
                    <button class="np-btn" data-val="4">4</button><button class="np-btn" data-val="5">5</button><button class="np-btn" data-val="6">6</button>
                    <button class="np-btn" data-val="7">7</button><button class="np-btn" data-val="8">8</button><button class="np-btn" data-val="9">9</button>
                    <button class="np-btn np-action" id="np-clear">C</button><button class="np-btn" data-val="0">0</button><button class="np-btn np-action" id="np-del">⌫</button>
                </div>
                <div class="modal-action-row">
                    <button id="btn-qty-cancel" class="btn-cancel">ANULUJ</button>
                    <button id="btn-qty-ok" class="btn-success">ZATWIERDŹ</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js?v=3.1"></script>
</body>
</html>
